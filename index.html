<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Backgammon Multiplayer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#1b1208; --felt:#0f5132; --wood:#5b3a1e; --wood2:#7a4f29;
    --light:#e9d7a4; --dark:#9c6b3a; --white:#f3ecd7; --black:#222;
    --accent:#ffcc33; --bad:#c0392b;
  }
  *{box-sizing:border-box;font-family:system-ui,Segoe UI,Roboto,sans-serif}
  body{margin:0;background:var(--bg);color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
  h1{margin:4px 0 12px;font-size:22px;letter-spacing:1px}
  .panel{background:#2b1d10;border:1px solid #7a4f29;border-radius:10px;padding:16px;max-width:520px;width:100%}
  button{background:var(--accent);border:0;color:#1b1208;font-weight:700;padding:10px 16px;border-radius:6px;cursor:pointer;font-size:14px}
  button:disabled{opacity:.5;cursor:not-allowed}
  button.ghost{background:transparent;border:1px solid var(--accent);color:var(--accent)}
  input{padding:10px;border-radius:6px;border:1px solid #7a4f29;background:#1b1208;color:#eee;font-size:16px;width:100%;text-transform:uppercase;letter-spacing:2px;text-align:center}
  .row{display:flex;gap:8px;margin-top:10px}
  .code{font-family:ui-monospace,Menlo,monospace;font-size:28px;letter-spacing:6px;background:#1b1208;padding:10px;border-radius:8px;text-align:center;color:var(--accent)}
  .status{margin:8px 0;min-height:20px;font-size:14px;color:#ddd}
  .err{color:var(--bad)}
  /* Board */
  #gameScreen{width:100%;max-width:820px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:14px}
  .board{
    background:var(--wood);
    border:8px solid var(--wood2);
    border-radius:8px;
    display:grid;
    grid-template-columns: 30px 1fr 30px 1fr 30px;
    grid-template-rows: 1fr 1fr;
    height:520px;
    gap:0;
  }
  .quad{background:var(--felt);display:grid;grid-template-columns:repeat(6,1fr);position:relative}
  .bar{background:var(--wood2);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:4px 0}
  .off{background:var(--wood2);display:flex;flex-direction:column;justify-content:space-between;padding:4px 2px}
  .point{position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer}
  .point.top{justify-content:flex-start}
  .point.bot{justify-content:flex-end}
  .point::before{
    content:"";position:absolute;left:0;right:0;
    border-left:calc(100% / 2 - 1px) solid transparent;
    border-right:calc(100% / 2 - 1px) solid transparent;
  }
  .point.top::before{top:0;height:90%;border-top:calc(260px - 8px) solid var(--light)}
  .point.bot::before{bottom:0;height:90%;border-bottom:calc(260px - 8px) solid var(--light)}
  .point.top.dark::before{border-top-color:var(--dark)}
  .point.bot.dark::before{border-bottom-color:var(--dark)}
  .point .num{position:absolute;font-size:10px;color:#000;opacity:.6;z-index:3}
  .point.top .num{top:2px}
  .point.bot .num{bottom:2px}
  .checkers{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;pointer-events:none;margin-top:2px;margin-bottom:2px}
  .point.bot .checkers{flex-direction:column-reverse}
  .checker{
    width:30px;height:30px;border-radius:50%;
    border:2px solid #000;
    box-shadow:0 1px 2px rgba(0,0,0,.6) inset, 0 1px 2px rgba(0,0,0,.4);
    margin:-4px 0 0 0;
  }
  .checker.white{background:radial-gradient(circle at 30% 30%,#fff,#c9bfa3)}
  .checker.black{background:radial-gradient(circle at 30% 30%,#555,#111)}
  .checker.count{display:flex;align-items:center;justify-content:center;color:#000;font-weight:700;font-size:12px;background:radial-gradient(circle at 30% 30%,#fff,#c9bfa3)}
  .checker.count.black{color:#fff;background:radial-gradient(circle at 30% 30%,#555,#111)}
  .point.selected::after{content:"";position:absolute;inset:0;background:rgba(255,204,51,.25);z-index:1}
  .point.legal::after{content:"";position:absolute;inset:0;background:rgba(40,200,120,.25);z-index:1}
  .bar-checkers{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;flex:1;justify-content:center}
  .off-label{font-size:10px;color:#eee;text-align:center;opacity:.7}
  .off-checkers{display:flex;flex-direction:column;align-items:center;flex:1;justify-content:center;color:#eee;font-size:12px;font-weight:700}
  .controls{display:flex;gap:12px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .dice{display:flex;gap:8px}
  .die{width:40px;height:40px;border-radius:6px;background:#f3ecd7;color:#000;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;border:2px solid #000}
  .die.used{opacity:.35}
  .legend{font-size:12px;color:#ccc}
  .turnbadge{padding:4px 10px;border-radius:20px;font-weight:700;font-size:12px}
  .turnbadge.white{background:#f3ecd7;color:#000}
  .turnbadge.black{background:#222;color:#fff;border:1px solid #666}
  @media (max-width:640px){
    .board{height:380px}
    .checker{width:22px;height:22px}
    .point.top::before{border-top-width:180px}
    .point.bot::before{border-bottom-width:180px}
  }
</style>
</head>
<body>
<h1>BACKGAMMON MULTIPLAYER</h1>

<!-- Lobby -->
<div id="lobby" class="panel">
  <div id="lobbyMain">
    <button id="btnCreate" style="width:100%">Create new game</button>
    <div class="row">
      <input id="joinCode" maxlength="6" placeholder="CODE" />
      <button id="btnJoin">Join</button>
    </div>
    <div id="lobbyStatus" class="status"></div>
  </div>
  <div id="waiting" style="display:none">
    <div class="legend">Game code — share with your opponent:</div>
    <div id="gameCode" class="code">------</div>
    <div class="status">Waiting for opponent to join…</div>
    <button id="btnCancel" class="ghost" style="width:100%">Cancel</button>
  </div>
</div>

<!-- Game -->
<div id="gameScreen" class="panel" style="display:none">
  <div class="topbar">
    <div>Code: <strong id="gCode" style="color:var(--accent);letter-spacing:3px"></strong></div>
    <div>You: <span id="youBadge" class="turnbadge white">WHITE</span></div>
    <div>Turn: <span id="turnBadge" class="turnbadge white">WHITE</span></div>
  </div>
  <div id="board" class="board"></div>
  <div class="controls">
    <button id="btnRoll">Roll dice</button>
    <div class="dice" id="dice"></div>
    <button id="btnPass" class="ghost">Pass / end turn</button>
    <span id="gameStatus" class="status" style="flex:1;text-align:right"></span>
  </div>
  <div class="legend">White moves 24→1. Black moves 1→24. Click a point to select, then click a destination.</div>
</div>

<!-- Game over -->
<div id="overScreen" class="panel" style="display:none;text-align:center">
  <h2 id="winnerText"></h2>
  <button onclick="location.reload()" style="width:100%">New game</button>
</div>

<script>
/* ===========================================================
   Supabase
=========================================================== */
const SUPA_URL = "https://jzxvvngyezybhqqumbmd.supabase.co";
const SUPA_KEY = "sb_publishable_ixngkc4AUnG-9IjRdpL_Ew_LNjI7NNN";
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
const TABLE = "backgammon_games";

/* ===========================================================
   Game state
=========================================================== */
let myColor = null;      // 'white' | 'black'
let gameId  = null;
let state   = null;      // full game state object
let selected = null;     // selected "from" point (1..24) or 'bar'
let realtimeChan = null;
let pollTimer = null;
let lastStatus = null;

function initialState() {
  const board = Array.from({length:25}, () => ({color:null,count:0})); // index 1..24
  const set = (p,c,n)=>{board[p]={color:c,count:n}};
  // White: 24(2), 13(5), 8(3), 6(5)
  set(24,'white',2); set(13,'white',5); set(8,'white',3); set(6,'white',5);
  // Black: 1(2), 12(5), 17(3), 19(5)
  set(1,'black',2); set(12,'black',5); set(17,'black',3); set(19,'black',5);
  return {
    board,
    bar:  {white:0, black:0},
    off:  {white:0, black:0},
    turn: 'white',
    dice: [],
    moves: [],          // remaining pip values
    rolled: false,
    winner: null,
    seq: 0,             // bumped on every local mutation to detect stale remote echoes
  };
}

/* ===========================================================
   Lobby
=========================================================== */
const $ = id => document.getElementById(id);

function showLobby()   { $('lobby').style.display=''; $('gameScreen').style.display='none'; $('overScreen').style.display='none'; }
function showWaiting() { $('lobbyMain').style.display='none'; $('waiting').style.display=''; }
function showGame()    { $('lobby').style.display='none'; $('gameScreen').style.display=''; $('overScreen').style.display='none'; }
function showOver(msg) { $('gameScreen').style.display='none'; $('overScreen').style.display=''; $('winnerText').textContent=msg; }

function randCode() {
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s=""; for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}

async function createGame() {
  $('btnCreate').disabled = true;
  const code = randCode();
  const s = initialState();
  const { error } = await sb.from(TABLE).insert({ id: code, state: s, status: 'waiting' });
  if (error) { $('lobbyStatus').textContent = "Error: "+error.message; $('lobbyStatus').className="status err"; $('btnCreate').disabled=false; return; }
  gameId = code; myColor = 'white'; state = s;
  $('gameCode').textContent = code;
  showWaiting();
  subscribeGame();          // realtime
  startPolling();           // polling fallback (the fix)
}

async function joinGame() {
  const code = $('joinCode').value.trim().toUpperCase();
  if (code.length !== 6) { $('lobbyStatus').textContent="Enter a 6-character code"; $('lobbyStatus').className="status err"; return; }
  const { data, error } = await sb.from(TABLE).select('*').eq('id', code).maybeSingle();
  if (error || !data) { $('lobbyStatus').textContent="Game not found"; $('lobbyStatus').className="status err"; return; }
  if (data.status !== 'waiting') { $('lobbyStatus').textContent="Game already started"; $('lobbyStatus').className="status err"; return; }
  gameId = code; myColor='black'; state = data.state;
  const { error: uerr } = await sb.from(TABLE).update({ status:'playing', state }).eq('id', code);
  if (uerr) { $('lobbyStatus').textContent="Error: "+uerr.message; $('lobbyStatus').className="status err"; return; }
  lastStatus = 'playing';
  enterGame();
  subscribeGame();
  startPolling();
}

async function cancelGame() {
  if (gameId) { await sb.from(TABLE).delete().eq('id', gameId); }
  stopPolling(); if (realtimeChan) sb.removeChannel(realtimeChan);
  gameId=null; state=null; myColor=null;
  $('waiting').style.display='none'; $('lobbyMain').style.display=''; $('btnCreate').disabled=false;
  showLobby();
}

/* ===========================================================
   Realtime + polling fallback
=========================================================== */
function subscribeGame() {
  if (realtimeChan) sb.removeChannel(realtimeChan);
  realtimeChan = sb
    .channel('g:'+gameId)
    .on('postgres_changes', { event:'*', schema:'public', table:TABLE, filter:`id=eq.${gameId}` },
        payload => { if (payload.new) applyRemote(payload.new); })
    .subscribe();
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(async () => {
    if (!gameId) return;
    const { data, error } = await sb.from(TABLE).select('state,status').eq('id', gameId).maybeSingle();
    if (error || !data) return;
    applyRemote(data);
  }, 2000);
}
function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer=null; } }

function applyRemote(row) {
  // The fix: when creator is in "waiting" and row flips to "playing", enter the game.
  if (row.status === 'playing' && lastStatus !== 'playing') {
    lastStatus = 'playing';
    state = row.state;
    if ($('gameScreen').style.display === 'none') enterGame();
  }
  if (row.status === 'playing' && state) {
    // Only accept remote state if it's strictly newer than our local state.
    // This prevents a poll that fetches pre-push data from clobbering an
    // optimistic local move.
    const localSeq  = state.seq  || 0;
    const remoteSeq = (row.state && row.state.seq) || 0;
    if (remoteSeq > localSeq) {
      state = row.state;
      renderGame();
    } else if (remoteSeq === localSeq && state.turn !== myColor) {
      // Opponent's turn, same seq — safe to re-sync (no local edits in flight).
      state = row.state;
      renderGame();
    }
    // else: our local state is ahead; ignore stale remote echo.
  }
  if (row.state && row.state.winner) {
    const msg = row.state.winner === myColor ? "You win!" : "You lose.";
    showOver(msg);
    stopPolling();
  }
}

/* ===========================================================
   Game UI
=========================================================== */
function enterGame() {
  lastStatus = 'playing';
  showGame();
  $('gCode').textContent = gameId;
  $('youBadge').textContent = myColor.toUpperCase();
  $('youBadge').className = 'turnbadge '+myColor;
  renderGame();
}

function renderGame() {
  if (!state) return;
  $('turnBadge').textContent = state.turn.toUpperCase();
  $('turnBadge').className = 'turnbadge '+state.turn;
  const myTurn = state.turn === myColor && !state.winner;
  $('btnRoll').disabled = !myTurn || state.rolled;
  $('btnPass').disabled = !myTurn || !state.rolled;
  // dice
  const dd = $('dice'); dd.innerHTML='';
  (state.dice||[]).forEach((v,i)=>{
    const d=document.createElement('div'); d.className='die'+(state.moves.includes(v)?'':' used'); d.textContent=v; dd.appendChild(d);
  });
  // board
  drawBoard();
  // status
  let msg='';
  if (state.winner) msg = (state.winner===myColor?'You win!':'You lose.');
  else if (!myTurn) msg = 'Waiting for opponent…';
  else if (!state.rolled) msg='Your turn — roll the dice.';
  else if (state.moves.length===0) msg='No moves left — end turn.';
  else msg='Make a move ('+state.moves.join(', ')+')';
  $('gameStatus').textContent = msg;
}

function drawBoard() {
  const b = $('board'); b.innerHTML='';
  // Layout:
  // Row1 (top):    off-bar? | quad top-left (13..18) | bar | quad top-right (19..24) | off
  // Row2 (bottom): off-bar? | quad bot-left (12..7)  | bar | quad bot-right (6..1)   | off
  const leftPadTop = cellDiv('bar');     // far-left column (reserved for bar-home perhaps)
  const leftPadBot = cellDiv('bar');

  const quadTL = quad('top',[13,14,15,16,17,18]);
  const quadTR = quad('top',[19,20,21,22,23,24]);
  const quadBL = quad('bot',[12,11,10,9,8,7]);
  const quadBR = quad('bot',[6,5,4,3,2,1]);

  const barTop = barCell('top');
  const barBot = barCell('bot');

  const offTop = offCell('top');
  const offBot = offCell('bot');

  b.appendChild(leftPadTop);
  b.appendChild(quadTL);
  b.appendChild(barTop);
  b.appendChild(quadTR);
  b.appendChild(offTop);

  b.appendChild(leftPadBot);
  b.appendChild(quadBL);
  b.appendChild(barBot);
  b.appendChild(quadBR);
  b.appendChild(offBot);
}

function cellDiv(cls){ const d=document.createElement('div'); d.className=cls; return d; }

function quad(pos, points) {
  const q = document.createElement('div'); q.className='quad';
  points.forEach((p, idx) => {
    const dark = (idx%2===(pos==='top'?1:0));
    const pt = document.createElement('div');
    pt.className = 'point '+pos+(dark?' dark':'');
    pt.dataset.point = p;
    const n=document.createElement('div'); n.className='num'; n.textContent=p; pt.appendChild(n);
    const ch=document.createElement('div'); ch.className='checkers';
    const slot = state.board[p];
    if (slot && slot.count>0) {
      const max = Math.min(slot.count,5);
      for (let i=0;i<max;i++){
        const c=document.createElement('div'); c.className='checker '+slot.color;
        if (i===max-1 && slot.count>5){ c.classList.add('count'); if(slot.color==='black')c.classList.add('black'); c.textContent=slot.count; }
        ch.appendChild(c);
      }
    }
    pt.appendChild(ch);
    if (selected === p) pt.classList.add('selected');
    if (isLegalDest(p)) pt.classList.add('legal');
    pt.onclick = () => onPointClick(p);
    q.appendChild(pt);
  });
  return q;
}

function barCell(pos) {
  const bar = document.createElement('div'); bar.className='bar';
  const group = document.createElement('div'); group.className='bar-checkers';
  // top bar shows black bar, bottom shows white bar
  const color = pos==='top' ? 'black' : 'white';
  const count = state.bar[color];
  for (let i=0;i<Math.min(count,5);i++){
    const c=document.createElement('div'); c.className='checker '+color;
    if (i===4 && count>5){ c.classList.add('count'); if(color==='black')c.classList.add('black'); c.textContent=count;}
    group.appendChild(c);
  }
  group.onclick = () => { if (state.bar[myColor]>0 && state.turn===myColor) { selected='bar'; renderGame(); } };
  if (selected==='bar' && color===myColor) group.style.outline='2px solid var(--accent)';
  bar.appendChild(group);
  return bar;
}

function offCell(pos) {
  const off = document.createElement('div'); off.className='off';
  const color = pos==='top' ? 'black' : 'white';
  const wrap = document.createElement('div'); wrap.className='off-checkers';
  const lbl = document.createElement('div'); lbl.className='off-label'; lbl.textContent=color.toUpperCase()+' OFF';
  const num = document.createElement('div'); num.textContent = state.off[color];
  wrap.appendChild(lbl); wrap.appendChild(num);
  // Clickable as destination for bearing off
  off.onclick = () => onOffClick(color);
  if (isLegalDest('off-'+color)) off.style.outline='2px solid #28c878';
  off.appendChild(wrap);
  return off;
}

/* ===========================================================
   Move logic
=========================================================== */
function dir(color){ return color==='white' ? -1 : 1; }
function homeRange(color){ return color==='white' ? [1,6] : [19,24]; }
function entryPoint(color, die){ return color==='white' ? (25-die) : die; }

function allInHome(color) {
  const [a,b] = homeRange(color);
  if (state.bar[color]>0) return false;
  for (let p=1;p<=24;p++){
    if (state.board[p].color===color && state.board[p].count>0) {
      if (p<a || p>b) return false;
    }
  }
  return true;
}

function highestOccupied(color) { // for bearing off: white=largest p in 1..6, black=smallest in 19..24
  if (color==='white') {
    for (let p=6;p>=1;p--) if (state.board[p].color==='white' && state.board[p].count>0) return p;
  } else {
    for (let p=19;p<=24;p++) if (state.board[p].color==='black' && state.board[p].count>0) return p;
  }
  return null;
}

function pipForMove(from, to, color) {
  if (to==='off') {
    if (color==='white') return from;            // distance to off = point number
    else return 25 - from;
  }
  return color==='white' ? (from - to) : (to - from);
}

function canLandOn(to, color) {
  const slot = state.board[to];
  if (!slot || slot.count===0) return true;
  if (slot.color===color) return true;
  return slot.count===1;                          // blot
}

function legalMoves(from) {
  const color = myColor;
  const res = new Set();
  if (state.moves.length===0) return res;
  if (from==='bar') {
    for (const d of new Set(state.moves)) {
      const ep = entryPoint(color,d);
      if (canLandOn(ep,color)) res.add(ep);
    }
    return res;
  }
  if (state.bar[color]>0) return res; // must enter from bar first
  const slot = state.board[from];
  if (!slot || slot.color!==color || slot.count===0) return res;
  for (const d of new Set(state.moves)) {
    const to = color==='white' ? from-d : from+d;
    if (to>=1 && to<=24 && canLandOn(to,color)) res.add(to);
    // bearing off
    if ((color==='white' && to<1) || (color==='black' && to>24)) {
      if (allInHome(color)) {
        const exact = pipForMove(from,'off',color);
        if (d===exact) res.add('off-'+color);
        else if (d>exact && from===highestOccupied(color)) res.add('off-'+color);
      }
    }
  }
  return res;
}

function isLegalDest(dest) {
  if (selected===null) return false;
  if (state.turn!==myColor || !state.rolled || state.winner) return false;
  const legals = legalMoves(selected);
  return legals.has(dest);
}

let flashTimer = null;
function flash(msg) {
  const el = $('gameStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = 'var(--bad)';
  if (flashTimer) clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { el.style.color=''; renderGame(); }, 1500);
}

function onPointClick(p) {
  if (state.winner) return;
  if (state.turn !== myColor) { flash("Not your turn"); return; }
  if (!state.rolled)          { flash("Roll the dice first"); return; }
  if (selected===null || selected===p) {
    // select
    if (state.bar[myColor]>0) { selected='bar'; renderGame(); return; }
    const slot = state.board[p];
    if (slot.color===myColor && slot.count>0) { selected=p; renderGame(); return; }
    flash("Select one of your checkers");
    return;
  }
  // try move
  const legals = legalMoves(selected);
  if (legals.has(p)) {
    applyMove(selected,p);
    selected=null;
    renderGame();
    maybeEndTurn();
    pushState();
    return;
  }
  // illegal — give feedback, then re-select if own point
  const slot=state.board[p];
  if (slot.color===myColor && slot.count>0 && state.bar[myColor]===0) {
    selected=p;
    renderGame();
  } else {
    selected=null;
    renderGame();
    flash("Illegal move");
  }
}

function onOffClick(color) {
  if (color!==myColor) return;
  if (selected===null) return;
  const legals = legalMoves(selected);
  const key='off-'+color;
  if (legals.has(key)) {
    applyMove(selected,'off');
    selected=null;
    renderGame();
    maybeEndTurn();
    pushState();
  }
}

function consumeDie(pip) {
  const i = state.moves.indexOf(pip);
  if (i>=0) state.moves.splice(i,1);
}

function applyMove(from, to) {
  const color = myColor;
  // determine pip used
  let pipUsed;
  if (from==='bar') {
    pipUsed = color==='white' ? (25-to) : to;
    state.bar[color]--;
    placeOn(to,color);
  } else if (to==='off') {
    const exact = pipForMove(from,'off',color);
    if (state.moves.includes(exact)) pipUsed = exact;
    else {
      // use smallest die >= exact (highest-occupied rule)
      pipUsed = Math.min(...state.moves.filter(d=>d>=exact));
    }
    removeFrom(from,color);
    state.off[color]++;
    if (state.off[color]===15) state.winner = color;
  } else {
    pipUsed = color==='white' ? (from-to) : (to-from);
    removeFrom(from,color);
    // handle blot capture
    const slot = state.board[to];
    if (slot.color && slot.color!==color && slot.count===1) {
      state.bar[slot.color]++;
      state.board[to]={color:null,count:0};
    }
    placeOn(to,color);
  }
  consumeDie(pipUsed);
}

function removeFrom(p,color){
  const s=state.board[p]; s.count--; if(s.count===0) s.color=null;
}
function placeOn(p,color){
  const s=state.board[p];
  if (!s.color) s.color=color;
  s.count++;
}

function hasAnyMove() {
  if (state.moves.length===0) return false;
  if (state.bar[myColor]>0) {
    for (const d of new Set(state.moves)) if (canLandOn(entryPoint(myColor,d),myColor)) return true;
    return false;
  }
  for (let p=1;p<=24;p++){
    if (state.board[p].color===myColor && state.board[p].count>0) {
      if (legalMoves(p).size>0) return true;
    }
  }
  return false;
}

function maybeEndTurn() {
  if (state.winner) return;
  if (!hasAnyMove()) {
    endTurn();
  }
}

function endTurn() {
  state.turn = state.turn==='white'?'black':'white';
  state.dice=[]; state.moves=[]; state.rolled=false;
  selected=null;
}

/* ===========================================================
   Roll / pass buttons
=========================================================== */
$('btnRoll').onclick = () => {
  if (state.turn!==myColor || state.rolled || state.winner) return;
  const d1 = 1+Math.floor(Math.random()*6);
  const d2 = 1+Math.floor(Math.random()*6);
  state.dice=[d1,d2];
  state.moves = d1===d2 ? [d1,d1,d1,d1] : [d1,d2];
  state.rolled=true;
  renderGame();
  if (!hasAnyMove()) { endTurn(); renderGame(); }
  pushState();
};
$('btnPass').onclick = () => {
  if (state.turn!==myColor || state.winner) return;
  endTurn();
  renderGame();
  pushState();
};

/* ===========================================================
   Persist state
=========================================================== */
let pushing=false, pendingPush=false;
async function pushState() {
  if (!gameId || !state) return;
  // bump seq so remote echoes of older state don't overwrite us
  state.seq = (state.seq || 0) + 1;
  if (pushing) { pendingPush = true; return; }
  pushing = true;
  try {
    do {
      pendingPush = false;
      await sb.from(TABLE).update({ state, status: state.winner ? 'finished' : 'playing' }).eq('id', gameId);
    } while (pendingPush);
  } finally {
    pushing = false;
  }
}

/* ===========================================================
   Wire up lobby buttons
=========================================================== */
$('btnCreate').onclick = createGame;
$('btnJoin').onclick   = joinGame;
$('btnCancel').onclick = cancelGame;
$('joinCode').addEventListener('input', e => e.target.value = e.target.value.toUpperCase());

showLobby();
</script>
