<style>

/* ===== DICE ===== */
.dice-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin: 12px 0 6px;
  min-height: 52px;
}

.die-face {
  width: 48px; height: 48px;
  background: #f5e8cc;
  border-radius: 9px;
  position: relative;
  box-shadow: 2px 3px 0 rgba(0,0,0,0.5), inset 0 0 6px rgba(0,0,0,0.08);

  justify-content: center;
  transition: opacity 0.2s, transform 0.15s;
}

.die-face.used { opacity: 0.25; transform: scale(0.92); }

@keyframes dieRoll {
  0% { transform: rotate(0deg) scale(1); }
  30% { transform: rotate(20deg) scale(1.1); }
  60% { transform: rotate(-12deg) scale(0.95); }
  100% { transform: rotate(0deg) scale(1); }
}

.die-inner {
  display: grid;
  width: 36px; height: 36px;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr 1fr;

  transition: all 0.2s;
}
.ctrl-btn:hover { background: rgba(200,149,58,0.12); }
.ctrl-btn:disabled { opacity: 0.28; cursor: not-allowed; }

/* bear off */
.bearoff-row {
  display: flex;
  gap: 24px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 6px 0 0;
}
.bearoff-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.85rem;
  color: var(--gold);
}

/* overlay */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.87);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.overlay.show { display: flex; }

.ov-box {
  background: linear-gradient(160deg, #1e1105, #100904);
  border: 2px solid var(--gold);

  text-align: center;
  box-shadow: 0 0 60px rgba(200,149,58,0.25);
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);

@keyframes popIn {

.ov-box h2 {
  font-family: 'Playfair Display', serif;

  margin-bottom: 10px;
}
.ov-box p { color: var(--cream); margin-bottom: 28px; font-size: 1.1rem; }
</style>

<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo-area">
    <h1>Backgammon</h1>
    <div class="tagline">Two Players · Real Time</div>
  </div>
  <div class="lobby-card">
    <h2>Enter Your Name</h2>
    <label class="field-label">Your name</label>
    <input class="field-input" id="player-name" placeholder="e.g. David" maxlength="20">

    <button class="btn primary" onclick="createGame()">Create New Game</button>

    <div class="divider">or join</div>

    <div class="join-row">
      <input class="field-input" id="join-code" placeholder="Game code" maxlength="6" style="text-transform:uppercase">
      <button class="btn sm" onclick="joinGame()">Join</button>
    </div>

    <div class="lobby-status" id="lobby-status"></div>
  </div>
</div>

<!-- WAITING ROOM -->
<div id="waiting-room">
  <div class="waiting-card">
    <h2>Game Created!</h2>
    <p style="color:var(--muted);font-size:0.95rem">Share this code with your opponent:</p>
    <div class="game-code" id="display-code">——</div>
    <p style="color:var(--muted);font-size:0.9rem;margin-bottom:24px"><span class="pulse-dot"></span>Waiting for opponent to join…</p>
    <button class="btn danger sm" onclick="cancelGame()" style="width:100%">Cancel</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="game-header">
    <div class="game-title">Backgammon</div>
    <div class="game-code-small" id="game-code-display"></div>
  </div>

  <div class="players-strip">
    <div class="player-pill" id="pill-white">
      <div class="c-dot w"></div>
      <span id="name-white">White</span>
    </div>
    <div style="color:var(--gold);opacity:0.4">◆</div>
    <div class="player-pill" id="pill-black">
      <div class="c-dot b"></div>
      <span id="name-black">Black</span>
    </div>
  </div>

  <div class="status-line" id="status-line">Loading…</div>

  <div class="board-outer">
    <div class="board-inner">
      <canvas id="board" width="740" height="500"></canvas>
    </div>
  </div>

  <div class="dice-row" id="dice-row"></div>

  <div class="controls-row">
    <button class="ctrl-btn primary" id="btn-roll" onclick="doRoll()" disabled="">Roll Dice</button>
    <button class="ctrl-btn" id="btn-end" onclick="doEndTurn()" disabled="">End Turn</button>
    <button class="ctrl-btn" onclick="leaveGame()">Leave</button>
  </div>

  <div class="bearoff-row">
    <div class="bearoff-label">
      <div class="c-dot w" style="width:14px;height:14px"></div>
      <span id="bo-white">Borne off: 0</span>
    </div>
    <div class="bearoff-label">
      <div class="c-dot b" style="width:14px;height:14px"></div>
      <span id="bo-black">Borne off: 0</span>
    </div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="overlay" id="win-overlay">
  <div class="ov-box">
    <h2 id="win-title">Victory!</h2>
    <p id="win-msg"></p>
    <button class="btn" onclick="leaveGame()">Back to Lobby</button>
  </div>
</div>

<script>
// ─── SUPABASE ────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://jzxvvngyezybhqqumbmd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ixngkc4AUnG-9IjRdpL_Ew_LNjI7NNN';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── STATE ───────────────────────────────────────────────────────────────────
let myName = '';
let myColor = null;        // 'white' | 'black'
let gameId = null;
let gameCode = null;
let gameState = null;
let selectedPoint = null;  // index 0-25 (24=bar-white,25=bar-black)
let subscription = null;
let moveHistory = [];

// ─── INITIAL BOARD ───────────────────────────────────────────────────────────
// points[0] unused, points[1..24] are the 24 points
// positive = white, negative = black
function freshBoard() {
  const b = new Array(27).fill(0);
  // White moves 24→1, Black moves 1→24
  b[1]  =  2;  // white
  b[6]  = -5;  // black
  b[8]  = -3;  // black
  b[12] =  5;  // white
  b[13] = -5;  // black
  b[17] =  3;  // white (fixed: white 17)
  b[19] =  5;  // white
  b[24] = -2;  // black
  return b;
}

// ─── LOBBY ───────────────────────────────────────────────────────────────────
function lobbyStatus(msg) {
  document.getElementById('lobby-status').textContent = msg;
}

async function createGame() {
  myName = document.getElementById('player-name').value.trim();
  if (!myName) { lobbyStatus('Enter your name first'); return; }

  gameCode = Math.random().toString(36).substring(2,8).toUpperCase();
  gameId = gameCode;
  myColor = 'white';

  const state = buildInitialState();
  state.white_name = myName;

  const { error } = await sb.from('backgammon_games').insert({
    id: gameCode,
    state: state,
    status: 'waiting'
  });

  if (error) { lobbyStatus('Error: ' + error.message); return; }

  document.getElementById('display-code').textContent = gameCode;
  show('waiting-room');
  subscribeToGame();
}

async function joinGame() {
  myName = document.getElementById('player-name').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!myName) { lobbyStatus('Enter your name first'); return; }
  if (!code) { lobbyStatus('Enter a game code'); return; }

  const { data, error } = await sb.from('backgammon_games').select('*').eq('id', code).single();
  if (error || !data) { lobbyStatus('Game not found'); return; }
  if (data.status !== 'waiting') { lobbyStatus('Game already in progress'); return; }

  gameCode = code;
  gameId = code;
  myColor = 'black';

  const newState = { ...data.state, black_name: myName };

  await sb.from('backgammon_games').update({
    state: newState,
    status: 'playing'
  }).eq('id', gameCode);

  show('game');
  gameState = newState;
  setupGame();
  subscribeToGame();
}

async function cancelGame() {
  if (gameCode) await sb.from('backgammon_games').delete().eq('id', gameCode);
  if (subscription) sb.removeChannel(subscription);
  gameCode = null; gameId = null;
  show('lobby');
}

function leaveGame() {
  if (subscription) sb.removeChannel(subscription);
  document.getElementById('win-overlay').classList.remove('show');
  gameCode = null; gameState = null; selectedPoint = null;
  show('lobby');
}

// ─── SUBSCRIPTION ────────────────────────────────────────────────────────────
function subscribeToGame() {
  if (subscription) sb.removeChannel(subscription);
  subscription = sb.channel('game-' + gameCode)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'backgammon_games',
      filter: 'id=eq.' + gameCode
    }, payload => {
      const s = payload.new.status;
      const st = payload.new.state;
      gameState = st;
      if (s === 'playing' && document.getElementById('game').style.display === 'none') {
        show('game');
        setupGame();
      } else {
        renderGame();
      }
    })
    .subscribe();
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
function buildInitialState() {
  return {
    board: freshBoard(),
    turn: 'white',
    dice: [],
    phase: 'roll',   // roll | move | done
    bar: { white: 0, black: 0 },
    borneOff: { white: 0, black: 0 },
    white_name: '',
    black_name: ''
  };
}

async function pushState(newState, status) {
  gameState = newState;
  await sb.from('backgammon_games').update({
    state: newState,
    status: status || 'playing'
  }).eq('id', gameCode);
}

// ─── SETUP GAME UI ────────────────────────────────────────────────────────────
function setupGame() {
  document.getElementById('game-code-display').textContent = 'Code: ' + gameCode;
  renderGame();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
const CANVAS_W = 740, CANVAS_H = 500;
const BOARD_L = 20, BOARD_T = 20, BOARD_R = 20, BOARD_B = 20;
const BAR_W = 50;
const W = CANVAS_W - BOARD_L - BOARD_R;
const H = CANVAS_H - BOARD_T - BOARD_B;
const HALF_W = (W - BAR_W) / 2;
const PT_W = HALF_W / 6;
const PT_H = H * 0.42;
const CHECKER_R = PT_W * 0.42;

function renderGame() {
  const s = gameState;
  if (!s) return;

  // name badges
  document.getElementById('name-white').textContent = s.white_name || 'White';
  document.getElementById('name-black').textContent = s.black_name || 'Black';

  // active pill
  document.getElementById('pill-white').classList.toggle('active', s.turn === 'white');
  document.getElementById('pill-black').classList.toggle('active', s.turn === 'black');

  // add (You) label
  const wLabel = (s.white_name || 'White') + (myColor === 'white' ? ' (You)' : '');
  const bLabel = (s.black_name || 'Black') + (myColor === 'black' ? ' (You)' : '');
  document.getElementById('name-white').textContent = wLabel;
  document.getElementById('name-black').textContent = bLabel;

  // borne off
  document.getElementById('bo-white').textContent = 'Borne off: ' + (s.borneOff?.white || 0);
  document.getElementById('bo-black').textContent = 'Borne off: ' + (s.borneOff?.black || 0);

  // status
  const statusEl = document.getElementById('status-line');
  const isMyTurn = s.turn === myColor;
  if (s.phase === 'done') {
    statusEl.textContent = '';
  } else if (s.phase === 'roll') {
    statusEl.textContent = isMyTurn ? 'Your turn — roll the dice!' : (getOpponentName() + "'s turn to roll…");
  } else {
    statusEl.textContent = isMyTurn ? 'Select a checker to move' : (getOpponentName() + ' is moving…');
  }

  // buttons
  document.getElementById('btn-roll').disabled = !(isMyTurn && s.phase === 'roll');
  document.getElementById('btn-end').disabled = !(isMyTurn && s.phase === 'move');

  // dice
  renderDice(s.dice || []);

  // board canvas
  drawBoard(s);

  // win check
  if (s.phase === 'done') {
    const winner = s.borneOff?.white >= 15 ? 'white' : 'black';
    const wName = winner === 'white' ? (s.white_name || 'White') : (s.black_name || 'Black');
    document.getElementById('win-title').textContent = winner === myColor ? '🏆 You Win!' : 'Defeat';
    document.getElementById('win-msg').textContent = wName + ' has borne off all checkers!';
    document.getElementById('win-overlay').classList.add('show');
  }
}

function getOpponentName() {
  if (!gameState) return 'Opponent';
  return myColor === 'white' ? (gameState.black_name || 'Black') : (gameState.white_name || 'White');
}

// ─── CANVAS BOARD ─────────────────────────────────────────────────────────────
function drawBoard(s) {
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  const ox = BOARD_L, oy = BOARD_T;

  // background felt
  ctx.fillStyle = '#1b3d2a';
  ctx.fillRect(ox, oy, W, H);

  // draw points (triangles)
  for (let i = 1; i <= 24; i++) {
    drawPoint(ctx, i, ox, oy, s);
  }

  // bar
  ctx.fillStyle = '#2a1505';
  ctx.fillRect(ox + HALF_W, oy, BAR_W, H);

  // border lines
  ctx.strokeStyle = 'rgba(200,149,58,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(ox, oy, W, H);
  ctx.strokeRect(ox + HALF_W, oy, BAR_W, H);

  // draw checkers on points
  for (let i = 1; i <= 24; i++) {
    drawCheckers(ctx, i, ox, oy, s);
  }

  // bar checkers
  drawBarCheckers(ctx, ox, oy, s);

  // highlight valid moves
  if (s.turn === myColor && s.phase === 'move' && selectedPoint !== null) {
    const moves = getValidDestinations(selectedPoint, s);
    moves.forEach(dest => highlightPoint(ctx, dest, ox, oy));
  }

  // highlight selected
  if (selectedPoint !== null) {
    const [px, py] = pointCenter(selectedPoint, ox, oy);
    ctx.beginPath();
    ctx.arc(px, py, CHECKER_R + 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(232,184,75,0.9)';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }
}

function pointCoords(pointNum, ox, oy) {
  // points 13-24 = bottom row (left half: 13-18, right half: 19-24)
  // points 1-12  = top row    (left half: 7-12,  right half: 1-6)
  let x, isBottom;
  if (pointNum >= 1 && pointNum <= 6) {
    // top-right, right to left: 1 is rightmost
    x = ox + HALF_W + BAR_W + (6 - pointNum) * PT_W;
    isBottom = false;
  } else if (pointNum >= 7 && pointNum <= 12) {
    // top-left, right to left: 7 is rightmost
    x = ox + (12 - pointNum) * PT_W;
    isBottom = false;
  } else if (pointNum >= 13 && pointNum <= 18) {
    // bottom-left, left to right: 13 is leftmost
    x = ox + (pointNum - 13) * PT_W;
    isBottom = true;
  } else {
    // bottom-right, left to right: 19 is leftmost
    x = ox + HALF_W + BAR_W + (pointNum - 19) * PT_W;
    isBottom = true;
  }
  return { x, isBottom };
}

function drawPoint(ctx, pointNum, ox, oy, s) {
  const { x, isBottom } = pointCoords(pointNum, ox, oy);
  const tipY = isBottom ? oy + H - PT_H : oy + PT_H;
  const baseY = isBottom ? oy + H : oy;
  const color = (pointNum % 2 === 0) ? '#7a2020' : '#b8832a';

  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.lineTo(x + PT_W, baseY);
  ctx.lineTo(x + PT_W / 2, tipY);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();

  // point number
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.font = '10px EB Garamond, serif';
  ctx.textAlign = 'center';
  ctx.fillText(pointNum, x + PT_W / 2, isBottom ? oy + H - 4 : oy + 12);
}

function pointCenter(pointNum, ox, oy) {
  if (pointNum === 24) return [ox + HALF_W + BAR_W / 2, oy + H * 0.25]; // bar white
  if (pointNum === 25) return [ox + HALF_W + BAR_W / 2, oy + H * 0.75]; // bar black
  const { x, isBottom } = pointCoords(pointNum, ox, oy);
  const py = isBottom ? oy + H - CHECKER_R - 2 : oy + CHECKER_R + 2;
  return [x + PT_W / 2, py];
}

function drawCheckers(ctx, pointNum, ox, oy, s) {
  const count = s.board[pointNum];
  if (count === 0) return;
  const isWhite = count > 0;
  const abs = Math.abs(count);
  const { x, isBottom } = pointCoords(pointNum, ox, oy);
  const cx = x + PT_W / 2;

  for (let i = 0; i < Math.min(abs, 5); i++) {
    const direction = isBottom ? -1 : 1;
    const cy = isBottom
      ? oy + H - CHECKER_R - 2 - i * (CHECKER_R * 2 + 1)
      : oy + CHECKER_R + 2 + i * (CHECKER_R * 2 + 1);
    drawChecker(ctx, cx, cy, isWhite);
  }
  if (abs > 5) {
    const cy = isBottom
      ? oy + H - CHECKER_R - 2 - 4 * (CHECKER_R * 2 + 1)
      : oy + CHECKER_R + 2 + 4 * (CHECKER_R * 2 + 1);
    ctx.fillStyle = 'rgba(232,184,75,0.9)';
    ctx.font = 'bold 11px EB Garamond';
    ctx.textAlign = 'center';
    ctx.fillText(abs, cx, cy + 4);
  }
}

function drawBarCheckers(ctx, ox, oy, s) {
  const bx = ox + HALF_W + BAR_W / 2;
  // white on bar (top half)
  for (let i = 0; i < s.bar.white; i++) {
    drawChecker(ctx, bx, oy + 30 + i * (CHECKER_R * 2 + 2), true);
  }
  // black on bar (bottom half)
  for (let i = 0; i < s.bar.black; i++) {
    drawChecker(ctx, bx, oy + H - 30 - i * (CHECKER_R * 2 + 2), false);
  }
}

function drawChecker(ctx, cx, cy, isWhite) {
  const r = CHECKER_R;
  const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
  if (isWhite) {
    grad.addColorStop(0, '#fff8e8');
    grad.addColorStop(0.5, '#e8d090');
    grad.addColorStop(1, '#c8a040');
  } else {
    grad.addColorStop(0, '#3a2810');
    grad.addColorStop(0.5, '#1a0e05');
    grad.addColorStop(1, '#0a0502');
  }
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = isWhite ? 'rgba(200,160,60,0.8)' : 'rgba(80,50,20,0.8)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // shine
  ctx.beginPath();
  ctx.arc(cx - r * 0.25, cy - r * 0.25, r * 0.3, 0, Math.PI * 2);
  ctx.fillStyle = isWhite ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.06)';
  ctx.fill();
}

function highlightPoint(ctx, pointNum, ox, oy) {
  if (pointNum === 26) { // bear off zone
    // right edge highlight
    ctx.fillStyle = 'rgba(232,184,75,0.18)';
    ctx.fillRect(ox + W, oy, 30, H / 2);
    return;
  }
  const [cx, cy] = pointCenter(pointNum, ox, oy);
  ctx.beginPath();
  ctx.arc(cx, cy, CHECKER_R + 6, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(232,184,75,0.22)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(232,184,75,0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// ─── DICE RENDER ──────────────────────────────────────────────────────────────
const PIP_POSITIONS = {
  1: [[1,1]],
  2: [[0,0],[2,2]],
  3: [[0,0],[1,1],[2,2]],
  4: [[0,0],[0,2],[2,0],[2,2]],
  5: [[0,0],[0,2],[1,1],[2,0],[2,2]],
  6: [[0,0],[0,1],[0,2],[2,0],[2,1],[2,2]]
};

function renderDice(dice) {
  const row = document.getElementById('dice-row');
  row.innerHTML = '';
  if (!dice.length) return;
  dice.forEach((d, i) => {
    const face = document.createElement('div');
    face.className = 'die-face' + (d.used ? ' used' : '');
    const inner = document.createElement('div');
    inner.className = 'die-inner';
    // 3x3 grid of pips
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const pip = document.createElement('div');
        const pips = PIP_POSITIONS[d.value] || [];
        const on = pips.some(p => p[0] === r && p[1] === c);
        pip.className = 'dp' + (on ? ' on' : '');
        inner.appendChild(pip);
      }
    }
    face.appendChild(inner);
    row.appendChild(face);
  });
}

// ─── CLICK HANDLER ────────────────────────────────────────────────────────────
document.getElementById('board').addEventListener('click', function(e) {
  if (!gameState || gameState.turn !== myColor || gameState.phase !== 'move') return;
  const canvas = this;
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  const scaleY = CANVAS_H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const clicked = getClickedPoint(mx, my);
  if (clicked === null) return;

  const s = gameState;
  const myBar = myColor === 'white' ? s.bar.white : s.bar.black;

  // must enter from bar first
  if (myBar > 0) {
    const barPt = myColor === 'white' ? 24 : 25;
    if (selectedPoint === null) {
      if (clicked === barPt) { selectedPoint = barPt; renderGame(); }
      return;
    }
    const dests = getValidDestinations(barPt, s);
    if (dests.includes(clicked)) {
      applyMove(barPt, clicked);
      selectedPoint = null;
    } else {
      selectedPoint = null; renderGame();
    }
    return;
  }

  if (selectedPoint === null) {
    // select a checker
    const pt = clicked <= 24 ? clicked : null;
    if (pt === null) return;
    const val = s.board[pt];
    const mine = myColor === 'white' ? val > 0 : val < 0;
    if (!mine) return;
    // check it has valid moves
    if (getValidDestinations(pt, s).length === 0) return;
    selectedPoint = pt;
    renderGame();
  } else {
    const dests = getValidDestinations(selectedPoint, s);
    if (clicked === selectedPoint) { selectedPoint = null; renderGame(); return; }
    if (dests.includes(clicked)) {
      applyMove(selectedPoint, clicked);
      selectedPoint = null;
    } else {
      // try to select a different checker
      const val = s.board[clicked] || 0;
      const mine = myColor === 'white' ? val > 0 : val < 0;
      if (mine && clicked !== selectedPoint) {
        selectedPoint = clicked; renderGame();
      } else {
        selectedPoint = null; renderGame();
      }
    }
  }
});

function getClickedPoint(mx, my) {
  const ox = BOARD_L, oy = BOARD_T;
  // bar
  const barX1 = ox + HALF_W, barX2 = barX1 + BAR_W;
  if (mx >= barX1 && mx <= barX2) {
    return my < oy + H / 2 ? 24 : 25; // 24=bar-white, 25=bar-black
  }
  // bear off zone (right of board)
  if (mx > ox + W && mx < ox + W + 30) return 26;

  for (let i = 1; i <= 24; i++) {
    const { x, isBottom } = pointCoords(i, ox, oy);
    if (mx >= x && mx <= x + PT_W) {
      if (isBottom && my >= oy + H / 2) return i;
      if (!isBottom && my <= oy + H / 2) return i;
    }
  }
  return null;
}

// ─── MOVE LOGIC ───────────────────────────────────────────────────────────────
function getAvailableDice(s) {
  return s.dice.filter(d => !d.used).map(d => d.value);
}

function getValidDestinations(from, s) {
  const avail = getAvailableDice(s);
  if (!avail.length) return [];
  const dests = new Set();
  const isWhite = myColor === 'white';
  const dir = isWhite ? -1 : 1; // white moves toward 1, black toward 24
  const inBearOff = canBearOff(s);

  avail.forEach(die => {
    let to;
    if (from === 24) { // white bar
      to = 25 - die; // enters in white's home opponent zone: points 24..19 mapped to entry
      to = 25 - die; // white enters on points 24-19 based on die
      // actually white enters opponent's home: points 24 down
      // standard: white enters on point (25 - die)
      if (isWhite) to = 25 - die;
    } else if (from === 25) { // black bar
      to = die; // black enters on point (die)
    } else {
      to = from + die * dir;
    }

    if (to >= 1 && to <= 24) {
      const target = s.board[to];
      const blocked = isWhite ? target < -1 : target > 1;
      if (!blocked) dests.add(to);
    } else if (inBearOff) {
      // bear off
      if (isWhite && to <= 0) dests.add(26);
      if (!isWhite && to >= 25) dests.add(26);
    }
  });

  return [...dests];
}

function canBearOff(s) {
  const b = s.board;
  const bar = s.bar;
  if (myColor === 'white') {
    if (bar.white > 0) return false;
    for (let i = 7; i <= 24; i++) if (b[i] > 0) return false;
    return true;
  } else {
    if (bar.black > 0) return false;
    for (let i = 1; i <= 18; i++) if (b[i] < 0) return false;
    return true;
  }
}

function getDieForMove(from, to, s) {
  const avail = getAvailableDice(s);
  const isWhite = myColor === 'white';
  const dir = isWhite ? -1 : 1;

  for (let die of avail) {
    let expected;
    if (from === 24) expected = 25 - die;
    else if (from === 25) expected = die;
    else expected = from + die * dir;

    if (to === 26) {
      // bear off: exact or overshoot
      if (isWhite && from - die <= 0) return die;
      if (!isWhite && from + die >= 25) return die;
    } else if (expected === to) {
      return die;
    }
  }
  return null;
}

function applyMove(from, to) {
  const s = JSON.parse(JSON.stringify(gameState));
  const isWhite = myColor === 'white';
  const die = getDieForMove(from, to, s);
  if (die === null) return;

  // mark die used
  const dieIdx = s.dice.findIndex(d => !d.used && d.value === die);
  if (dieIdx === -1) return;
  s.dice[dieIdx].used = true;

  // remove from source
  if (from === 24) s.bar.white--;
  else if (from === 25) s.bar.black--;
  else {
    if (isWhite) s.board[from]--;
    else s.board[from]++;
  }

  if (to === 26) {
    // bear off
    if (isWhite) s.borneOff.white++;
    else s.borneOff.black++;
  } else {
    const target = s.board[to];
    // hit a blot?
    if (isWhite && target === -1) { s.board[to] = 0; s.bar.black++; }
    else if (!isWhite && target === 1) { s.board[to] = 0; s.bar.white++; }
    // land
    if (isWhite) s.board[to]++;
    else s.board[to]--;
  }

  // check win
  if (s.borneOff.white >= 15 || s.borneOff.black >= 15) {
    s.phase = 'done';
    pushState(s, 'done');
    return;
  }

  // check if more moves possible
  const remaining = s.dice.filter(d => !d.used);
  if (remaining.length === 0 || !hasAnyMove(s)) {
    s.phase = 'move'; // will be switched to next turn on endTurn
    // auto end if no moves
    if (remaining.length === 0 || !hasAnyMove(s)) {
      switchTurn(s);
      return;
    }
  }

  pushState(s);
}

function hasAnyMove(s) {
  const b = s.board;
  const bar = s.bar;
  const isWhite = s.turn === 'white';
  const avail = s.dice.filter(d => !d.used).map(d => d.value);
  if (!avail.length) return false;
  const dir = isWhite ? -1 : 1;

  // check bar
  if (isWhite && bar.white > 0) {
    return avail.some(die => {
      const to = 25 - die;
      return to >= 1 && to <= 24 && b[to] > -2;
    });
  }
  if (!isWhite && bar.black > 0) {
    return avail.some(die => {
      const to = die;
      return to >= 1 && to <= 24 && b[to] < 2;
    });
  }

  for (let pt = 1; pt <= 24; pt++) {
    const val = b[pt];
    const mine = isWhite ? val > 0 : val < 0;
    if (!mine) continue;
    for (let die of avail) {
      const to = pt + die * dir;
      if (to >= 1 && to <= 24) {
        const blocked = isWhite ? b[to] < -1 : b[to] > 1;
        if (!blocked) return true;
      } else {
        // bear off check
        if (canBearOffState(s)) return true;
      }
    }
  }
  return false;
}

function canBearOffState(s) {
  const b = s.board;
  const bar = s.bar;
  if (s.turn === 'white') {
    if (bar.white > 0) return false;
    for (let i = 7; i <= 24; i++) if (b[i] > 0) return false;
    return true;
  } else {
    if (bar.black > 0) return false;
    for (let i = 1; i <= 18; i++) if (b[i] < 0) return false;
    return true;
  }
}

function switchTurn(s) {
  s.turn = s.turn === 'white' ? 'black' : 'white';
  s.dice = [];
  s.phase = 'roll';
  pushState(s);
}

// ─── ROLL ─────────────────────────────────────────────────────────────────────
function doRoll() {
  const s = JSON.parse(JSON.stringify(gameState));
  const d1 = Math.ceil(Math.random() * 6);
  const d2 = Math.ceil(Math.random() * 6);
  let dice;
  if (d1 === d2) {
    dice = [d1, d1, d1, d1].map(v => ({ value: v, used: false }));
  } else {
    dice = [{ value: d1, used: false }, { value: d2, used: false }];
  }
  s.dice = dice;
  s.phase = 'move';

  // check if any move possible
  if (!hasAnyMove(s)) {
    // no moves, skip turn
    switchTurn(s);
    return;
  }
  pushState(s);
}

function doEndTurn() {
  const s = JSON.parse(JSON.stringify(gameState));
  switchTurn(s);
}

// ─── SHOW/HIDE SCREENS ────────────────────────────────────────────────────────
function show(screen) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('waiting-room').style.display = 'none';
  document.getElementById('game').style.display = 'none';

  if (screen === 'lobby') document.getElementById('lobby').style.display = 'flex';
  if (screen === 'waiting-room') document.getElementById('waiting-room').style.display = 'flex';
  if (screen === 'game') document.getElementById('game').style.display = 'flex';
}
